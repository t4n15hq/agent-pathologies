# Within-family pairs for Pivot A. Ordering matters: cheaper pairs first,
# so if budget runs out we still have the most rows. Resumable design
# means re-running picks up where any 402 / outage left off.

pairs:
  # --- Qwen3 30b: cheapest, run first ---
  - family: qwen3-30b
    base_provider: openrouter
    instruct:
      model: qwen/qwen3-30b-a3b-instruct-2507
      upstream_provider: Nebius
      price_in_per_m: 0.09
      price_out_per_m: 0.30
    reasoning:
      model: qwen/qwen3-30b-a3b-thinking-2507
      upstream_provider: AtlasCloud
      price_in_per_m: 0.08
      price_out_per_m: 0.40

  # --- Qwen3 235b: medium cost ---
  - family: qwen3-235b
    base_provider: openrouter
    instruct:
      model: qwen/qwen3-235b-a22b-2507
      upstream_provider: Novita
      price_in_per_m: 0.07
      price_out_per_m: 0.10
    reasoning:
      model: qwen/qwen3-235b-a22b-thinking-2507
      upstream_provider: Alibaba
      price_in_per_m: 0.15
      price_out_per_m: 1.50

  # --- DeepSeek V4-flash: cheap via DeepSeek direct ---
  - family: deepseek-v4-flash
    base_provider: deepseek_direct
    instruct:
      model: deepseek-chat
      price_in_per_m: 0.14
      price_out_per_m: 0.28
    reasoning:
      model: deepseek-reasoner
      price_in_per_m: 0.14
      price_out_per_m: 0.28

  # --- DeepSeek V4-pro: most expensive, run last so budget bottlenecks here.
  # NOTE (2026-05-15 PREREGISTRATION amendment): the routing here is the
  # ORIGINAL sweep configuration. All V4-pro retries (and the rows that
  # compose the final analyzable dataset) instead route through
  # api.deepseek.com with model="deepseek-v4-pro" and the V4-family-native
  # `thinking: {type: "enabled"|"disabled"}` parameter. The OR/Novita
  # configuration below is preserved for reproducibility of the original
  # sweep; the retry pipeline (`scripts/retry_v4pro_*.py`) hardcodes the
  # DS-direct route. See paper §sec:methods:v4pro-routing.
  - family: deepseek-v4-pro
    base_provider: openrouter
    instruct:
      model: deepseek/deepseek-v4-pro
      upstream_provider: Novita
      reasoning_config: {enabled: false}
      price_in_per_m: 0.43
      price_out_per_m: 0.87
    reasoning:
      model: deepseek/deepseek-v4-pro
      upstream_provider: Novita
      reasoning_config: {effort: "high"}
      price_in_per_m: 0.43
      price_out_per_m: 0.87

# Stage 2 anchor (Claude Opus 4.7) — only run with --anchors only after
# stage 1 is complete and credit balance is confirmed.
anchors:
  - family: claude-4.7
    instruct:
      model: anthropic/claude-opus-4.7
      provider: openrouter
      upstream_provider: Anthropic
      price_in_per_m: 5.00
      price_out_per_m: 25.00
